# docker-compose.test.yaml
# docker compose -f docker-compose.test.yaml up -d --build
services:
  wine_host: # this is the name of the service and name of the host (POSTGRES_HOST)
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    restart: unless-stopped
    # image: postgres:17-alpine # based on this image
    image: ghcr.io/alexanderjkochnev/postgres:17-alpine
    command: >
      postgres
      -c shared_buffers=16GB
      -c effective_cache_size=48GB
      -c maintenance_work_mem=2GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=32MB
      -c min_wal_size=1GB
      -c max_wal_size=8GB
      -c max_worker_processes=14
      -c max_parallel_workers_per_gather=2
      -c max_connections=200
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "${POSTGRES_PORT}"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./pg_dump:/tmp

    healthcheck:
      test: |
        sh -c 'pg_isready -h localhost -p ${POSTGRES_PORT} -U ${POSTGRES_USER} -d ${POSTGRES_DB}'
      # минимальная конфигурация для того что бы не было проблем с role root doesnnot exists
      interval: 10s # 1m30s
      timeout: 10s
      retries: 5
      start_period: 40s
      start_interval: 5s
    deploy:
      resources:
        limits:
          cpus: '4'  # Меньше ресурсов для тестового окружения
          memory: 10G
        reservations:
          cpus: '1'
          memory: 4G
    networks:
      - internal_network
      
   
  
  app:
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    build: .
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port ${API_PORT} --loop auto --workers ${APP_WORKERS}
    depends_on:
      pgbouncer:
        condition: service_healthy
      wine_host:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - ${API_PORT}
    environment:
      POSTGRES_HOST: ${PGBOUNCER_CONTAINER_NAME}
      WEB_PORT: 6432
      WEB_HOST: pgbouncer
      # POSTGRES_HOST: ${POSTGRES_HOST}
      # WEB_PORT: ${API_PORT}
      # WEB_HOST: ${API_HOST}
      BASE_URL: ${BASE_URL}
      SEARXNG_URL: "http://searxng:8080"
      OLLAMA_HOST: ${OLLAMA_HOST}
    volumes:
      - ./templates:/app/templates
      - ./migration_volume:/app/app/migration/versions
      - ./upload_volume:/app/upload_volume
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 4G
    networks:
      # - internal_network  # расскомментировать для теста
      - pgbouncer_network # Для связи с pgbouncer
      - shared_network    # Для связи с Nginx

  mongo:
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    image: ghcr.io/alexanderjkochnev/mongo:4.4.20
    hostname: ${MONGO_HOSTNAME}
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: admin
    expose:
      - "${MONGO_INN_PORT}"
    volumes:
      - ./mongodb_data:/data/db
      - ./mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    command: >
      mongod
      --bind_ip_all
      --wiredTigerCacheSizeGB 4
      --storageEngine wiredTiger
      --journalCommitInterval 500
      --syncdelay 300
      --nojournal
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:${MONGO_INN_PORT}/admin --quiet --username admin --password admin
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    networks:
      - shared_network
      - internal_network
    
  preact_front:
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    build:
      context: ./preact_front          # путь к папке с Preact
      dockerfile: Dockerfile           # имя Dockerfile внутри ./preact_front
    expose:
      - "80"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    networks:
      - shared_network
  
  pgbouncer:
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      SERVER_IDLE_TIMEOUT: 600
      QUERY_TIMEOUT: 60
      DEFAULT_POOL_SIZE: 50
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 5
      LISTEN_PORT: 6432
      ADMIN_USERS: wine
      # ВАЖНО: Явно создаем userlist через переменные
      AUTH_FILE: /etc/pgbouncer/userlist.txt
      # Дополнительные пользователи (если нужны)
      USERS: "${POSTGRES_USER} ${POSTGRES_PASSWORD}"
    expose:
      - "6432"
    restart: unless-stopped
    healthcheck:
      # Официальный способ проверки pgbouncer (внутри образа есть psql-client)
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432", "-U", "${POSTGRES_USER}", "-d", "wine_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      wine_host:
        condition: service_healthy
    deploy:
      replicas: 2  # Меньше реплик для теста
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - internal_network
      - pgbouncer_network
    
  
  ollama:
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    image: ollama/ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - shared_network
 
# SearXNG - локальный метапоисковик (без лимитов!)
  searxng:
    image: searxng/searxng:latest
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    expose:
      - "${SEARXNG_PORT}"
    volumes:
      - ./searxng-config:/etc/searxng:rw,z
      - searxng-data:/var/cache/searxng
    environment:
      # - SEARXNG_BASE_URL=${BASE_URL}/searxng  # Важно! Базовый URL через nginx
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}  # через .env
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL}  # базовый url
      - SEARXNG_PORT=${SEARXNG_PORT}
      - SEARXNG_BIND_ADDRESS=0.0.0.0
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    restart: unless-stopped
    networks:
      - shared_network
      - internal_network
  
  redis:
    image: redis:7.2-alpine
    # container_name: redis_cache
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 900 1
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal_network
  
volumes:
  migration_volume: # alembic migrations
  pg_data: # postgresql data
  pg_dump: # postgres dump/restore
  mongodb_data:
  upload_volume:
  certs_data:
  certbot_www:
  ollama_data:
  searxng-data:

networks:
  shared_network:
    driver: bridge
    external: true
    name: nginx_gateway_shared_network
  pgbouncer_network:
    driver: bridge
  internal_network:
    internal: true
    driver: bridge
  