# docker-compose.yaml
services:
  wine_host: # this is the name of the service and name of the host (POSTGRES_HOST)
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    restart: unless-stopped
    # image: postgres:17-alpine # based on this image
    image: ghcr.io/alexanderjkochnev/postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "${POSTGRES_PORT}"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./pg_dump:/tmp

    healthcheck:
      test: |
        sh -c 'pg_isready -h localhost -p ${POSTGRES_PORT} -U ${POSTGRES_USER} -d ${POSTGRES_DB}'
      # минимальная конфигурация для того что бы не было проблем с role root doesnnot exists
      interval: 10s # 1m30s
      timeout: 10s
      retries: 5
      start_period: 40s
      start_interval: 5s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.125'
          memory: 256M
    networks:
      - postgres_network
  
  adminer:
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    image: ghcr.io/alexanderjkochnev/adminer:4.8.1
    # image: adminer:4.8.1
    restart: unless-stopped
    environment:
      - ADMINER_PLUGINS=tables-filter enum-option enum-types
      - ADMINER_DESIGN=nette
    depends_on:
      - wine_host
    ports:
      - "${ADMINER_PORTS}"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.12'
          memory: 256M
    networks:
      - postgres_network
      - shared_network
  
  app:
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    build: .
    # restart:
    command: uvicorn app.main:app --host ${API_HOST} --port ${API_PORT} --loop auto --workers ${APP_WORKERS}
    depends_on:
      wine_host:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - ${API_PORT}:${API_PORT}
    environment:
      POSTGRES_HOST: ${PGBOUNCER_CONTAINER_NAME}
      WEB_PORT: ${API_PORT}
      WEB_HOST: ${API_HOST}
      BASE_URL: ${BASE_URL}
      SEARXNG_URL: "http://searxng:8080"
    volumes:
      - ./templates:/app/templates
      - ./migration_volume:/app/app/migration/versions
      - ./upload_volume:/app/upload_volume
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - postgres_network  # расскомментировать для теста
      # - pgbouncer_network # Для связи с pgbouncer
      - redis_network    # Для связи с Nginx
      - ollama_network
      - searxng_network
      - mongodb_network
      - preact_network
      - shared_network
  
  mongo:
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    image: ghcr.io/alexanderjkochnev/mongo:4.4.20
    hostname: ${MONGO_HOSTNAME}
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: admin
    expose:
      - "${MONGO_INN_PORT}"
    # ports:
    #   - "${MONGO_OUT_PORT}:${MONGO_INN_PORT}"
    volumes:
      - ./mongodb_data:/data/db
      - ./mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    command: >
      mongod
      --bind_ip_all
      --wiredTigerCacheSizeGB 0.25
      --storageEngine wiredTiger
      --journalCommitInterval 500
      --syncdelay 300
      --nojournal
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:${MONGO_INN_PORT}/admin --quiet --username admin --password admin
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - mongodb_network
  
  mongo-express:
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    image: ghcr.io/alexanderjkochnev/mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${ME_CONFIG_MONGODB_ADMINUSERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${ME_CONFIG_MONGODB_ADMINPASSWORD}
      ME_CONFIG_MONGODB_SERVER: ${ME_CONFIG_MONGODB_SERVER}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
    ports:
      - "${ME_OUT_PORT}:${ME_INN_PORT}"
    depends_on:
      wine_host:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${ME_INN_PORT}" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.250'
          memory: 256M
    networks:
      - shared_network
      - mongodb_network

  preact_front:
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    build:
      context: ./preact_front          # путь к папке с Preact
      dockerfile: Dockerfile.dev       # имя Dockerfile внутри ./preact_front
    ports:
      - "${PREACT_PORT}:5173"                    # хост:контейнер (порт Vite по умолчанию — 5173)
    env_file:
      - .env
    volumes:
      - ./preact_front/src:/app/src
      - ./preact_front/public:/app/public
      - ./preact_front/package.json:/app/package.json
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true  # для работы hot-reload в Docker ?
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    networks:
      - preact_network
 
# SearXNG - локальный метапоисковик (без лимитов!)
  searxng:
    image: searxng/searxng:latest
    logging:
      driver: ${LOGGER_DRIVER}
      options:
        max-size: ${MAX_SIZE}
        max-file: ${MAX_FILE}
    expose:
      - "${SEARXNG_PORT}"
    volumes:
      - ./searxng-config:/etc/searxng:rw,z
      - searxng-data:/var/cache/searxng
    environment:
      # - SEARXNG_BASE_URL=${BASE_URL}/searxng  # Важно! Базовый URL через nginx
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}  # через .env
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL}  # базовый url
      - SEARXNG_PORT=${SEARXNG_PORT}
      - SEARXNG_BIND_ADDRESS=0.0.0.0
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    restart: unless-stopped
    networks:
      - searxng_network
  
  redis:
    image: redis:7.2-alpine
    # container_name: redis_cache
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 900 1
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - redis_network
    # ulimits:
    #   nofile:
    #     soft: 10000
    #     hard: 10000
  
volumes:
  migration_volume: # alembic migrations
  pg_data: # postgresql data
  pg_dump: # postgres dump/restore
  mongodb_data:
  upload_volume:
  searxng-data:
  redis_data:

networks:
  shared_network:
    driver: bridge
    external: true
    name: nginx_gateway_shared_network
  pgbouncer_network:
    driver: bridge
    internal: true
  postgres_network:
    internal: true
    driver: bridge
  redis_network:
    internal: true
    driver: bridge
  ollama_network:
    internal: true
    driver: bridge
  mongodb_network:
    internal: true
    driver: bridge
  searxng_network:
    driver: bridge
  preact_network:
    driver: bridge
  